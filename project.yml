name: Tailscode
options:
  bundleIdPrefix: com.guitaripod
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
packages:
  CodingAgentKit:
    path: ../../swift/CodingAgentKit
targets:
  Tailscode:
    type: application
    platform: iOS
    sources:
      - path: Tailscode
      - path: TailscodeWidget/UsageWidget.swift
    dependencies:
      - package: CodingAgentKit
        product: CodingAgentKit
      - package: CodingAgentKit
        product: CodingAgentKitApple
      - package: CodingAgentKit
        product: AgentTestSupport
      - target: TailscodeWidget
        embed: true
      - target: TailscodeNSE
        embed: true
      - sdk: WidgetKit.framework
        weak: true
      - sdk: FoundationModels.framework
        weak: true
    info:
      path: Tailscode/Info.plist
      properties:
        CFBundleDisplayName: Tailscode
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        NSSupportsLiveActivities: true
        CFBundleURLTypes:
          - CFBundleURLName: com.guitaripod.tailscode
            CFBundleURLSchemes: [tailscode]
        NSSupportsLiveActivitiesFrequentUpdates: true
        UIApplicationShortcutItems:
          - UIApplicationShortcutItemType: com.guitaripod.tailscode.compose
            UIApplicationShortcutItemTitle: New Chat
            UIApplicationShortcutItemIconSymbolName: square.and.pencil
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Automatic
        NSPhotoLibraryUsageDescription: Attach images from your library to a prompt.
        NSLocalNetworkUsageDescription: Tailscode connects to coding-agent servers you run on your own machines, including ones on your local network.
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UIBackgroundModes: [fetch, remote-notification]
        BGTaskSchedulerPermittedIdentifiers: [com.guitaripod.tailscode.usage-refresh]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.guitaripod.tailscode
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "7"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: P4DQK6SRKR
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY[sdk=iphoneos*]: "Apple Development: Marcus Ziadé (AUJJ76QHS7)"
        PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]: Tailscode Dev iPhone Air 2026
        CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]: NO
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: Tailscode/Tailscode-Debug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: Tailscode/Tailscode-Release.entitlements

  TailscodeWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: TailscodeWidget
      - path: Tailscode/LiveActivity/ChatActivityAttributes.swift
      - path: Tailscode/Usage/UsageWidgetStore.swift
      - path: Tailscode/Usage/UsageControlIntents.swift
      - path: Tailscode/Usage/UsageWidgetWriter.swift
      - path: Tailscode/Usage/UsagePushPayload.swift
      - path: Tailscode/Usage/LiveQuotaFetcher.swift
      - path: Tailscode/Connection/SharedConnectionStore.swift
      - path: Tailscode/Logging/AppLogger.swift
      - path: Tailscode/Logging/LogFileWriter.swift
    info:
      path: TailscodeWidget/Info.plist
      properties:
        CFBundleDisplayName: Tailscode
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: Tailscode's widgets read live usage from coding-agent servers you run, including ones on your local network.
    dependencies:
      - package: CodingAgentKit
        product: CodingAgentKit
      - package: CodingAgentKit
        product: CodingAgentKitApple
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.guitaripod.tailscode.widget
        SKIP_INSTALL: YES
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "7"
        DEVELOPMENT_TEAM: P4DQK6SRKR
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY[sdk=iphoneos*]: "Apple Development: Marcus Ziadé (AUJJ76QHS7)"
        PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]: Tailscode Widget Dev iPhone Air 2026
        CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]: NO
        CODE_SIGN_ENTITLEMENTS: TailscodeWidget/TailscodeWidget.entitlements

  TailscodeNSE:
    type: app-extension
    platform: iOS
    sources:
      - path: TailscodeNSE
      - path: Tailscode/Usage/UsageWidgetStore.swift
      - path: Tailscode/Usage/UsagePushPayload.swift
      - path: Tailscode/Logging/AppLogger.swift
      - path: Tailscode/Logging/LogFileWriter.swift
    info:
      path: TailscodeNSE/Info.plist
      properties:
        CFBundleDisplayName: Tailscode
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    dependencies:
      - sdk: UserNotifications.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.guitaripod.tailscode.nse
        SKIP_INSTALL: YES
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "7"
        DEVELOPMENT_TEAM: P4DQK6SRKR
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY[sdk=iphoneos*]: "Apple Development: Marcus Ziadé (AUJJ76QHS7)"
        PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]: Tailscode NSE Dev iPhone Air 2026
        CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]: NO
        CODE_SIGN_ENTITLEMENTS: TailscodeNSE/TailscodeNSE.entitlements

schemes:
  Tailscode:
    build:
      targets:
        Tailscode: all
    run:
      config: Debug
      storeKitConfiguration: Tailscode.storekit
    archive:
      config: Release
